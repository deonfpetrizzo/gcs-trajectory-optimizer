planner:
  ros__parameters:
    pcd_file: /home/deon/gcs_planning_ws/maps/caltech_scan.pcd   # point cloud map to load at startup
    frame_id: map                                # frame all published messages are stamped in
    pcd_yaw_deg: 189.0                           # rotates the raw cloud about Z after loading, to match the nominal path's frame
    cloud_voxel_leaf: 0.2                        # voxel-downsample leaf size (m) applied to the loaded cloud = point spacing; trav_resolution should stay >= this
    viz_voxel_leaf: 0.6

    outlier_filter_enable: false
    outlier_filter_type: radius
    outlier_radius: 0.5
    outlier_min_neighbors: 4
    outlier_mean_k: 20
    outlier_stddev: 1.0

    nominal_path_csv_files: [                   # one file per vehicle; seg_idx/tag columns split each into segments
      "/home/deon/gcs_planning_ws/paths/path_m4.csv",
      "/home/deon/gcs_planning_ws/paths/path_g1.csv",
      "/home/deon/gcs_planning_ws/paths/path_g1m4.csv",
    ]

    traj_output_dir: /home/deon/gcs_planning_ws/trajs  # per-vehicle trajectory CSV export dir; empty disables export
    republish_period_sec: 2.0                          # how often cached state is re-published for late-joining RViz displays

    region_radius: 5.0             # sphere-flip region radius (R)
    num_threads: 10                # regions grown per round
    max_rounds: 300                # safety cap on growth rounds
    drop_covered_samples: false    # skip a sample already covered by a grown region
    corridor_seed: 0               # 0 seeds from std::random_device (non-deterministic)

    ground_plane_fit_radius: 2.0     # horizontal radius for the local ground-plane fit (corridor lift + endpoint z-snap)
    ground_plane_z_window: 1.0       # vertical window for the local ground-plane fit
    ground_floor_offset: -0.1        # prism floor relative to the fitted plane (negative = below plane, gives z-margin)
    ground_grid_margin: 2.0          # xy padding added around the cloud bounds when sizing the traversability grid

    trav_resolution: 0.3             # traversability/occupancy grid cell size (m); keep >= cloud point spacing
    trav_slope_fit_radius: 0.3       # neighborhood radius for the per-cell PCA plane fit (slope/roughness)
    trav_ground_z_window: 0.3        # z-band above local ground kept for the per-cell plane fit
    trav_clearance_ceiling: 2.0      # how high above ground to scan a column for overhead obstacles
    trav_min_points: 3               # min neighborhood points for a cell to be valid (else marked occupied)
    trav_smooth_sigma: 1.0           # Gaussian smoothing radius (cells) for the ground-height field; <= 0 disables

    robot_max_slope_deg: 20.0        # max traversable terrain slope
    robot_max_roughness: 0.5         # max terrain roughness (RMS residual of the plane fit, m)
    robot_max_step: 0.15             # max traversable step/curb height (m); waived when robot_allow_stairs
    robot_height: 1.0                # ground-corridor prism height + required overhead clearance (m)
    robot_min_clearance: 0.5         # reserved: minimum free band above ground (occupancy currently gates on robot_height)
    robot_footprint_radius: 0.3      # occupancy inflation radius (m)
    robot_allow_stairs: false        # legged robots: waive the step-height gate (treat steps as traversable)

    occ_score_threshold: 0.3         # a cell is free iff its traversability score >= this (and clearance ok)

    takeoff_landing_height: 1.5         # vertical column height
    takeoff_landing_accel_limit: 1.0    # acceleration limit for the closed-form quintic ease profile

    vel_limit: 1.3                  # ||r'(t)|| <= vel_limit (m/s)
    bezier_degree: 6                # per-segment Bezier degree
    continuity: 4                   # continuity order enforced at segment junctions
    sample_dt: 0.05                 # output trajectory sampling interval
    geom_accel_limit: 0.0           # box cap on ||q''(s)|| (path curvature); <= 0 disables
    time_accel_limit: 0.0           # box cap on |h''(s)| (timing curvature); <= 0 disables
    t_min: 0.0                      # minimum total segment duration
    t_max: 1.0e+9                   # maximum total segment duration
    h_dot_min: 0.001                # lower bound on h'(s), keeps the timing map monotonic
    soc_facets: 16                  # polyhedral facet count approximating the velocity SOC
    rest_to_rest_accel: true        # zero acceleration at each segment's start/end

    # objective regularization terms
    w_geom_accel: 0.3      # weight on integral ||q''||^2 (geometric smoothness)
    w_time_accel: 0.1      # weight on integral ||h''||^2 (timing smoothness)
    w_geom_jerk: 0.0       # weight on integral ||q'''||^2
    w_geom_length: 1.0     # weight on integral ||q'||^2 (path-length proxy)
    w_time: 0.5            # weight on total duration T

trajectory_executor:
  ros__parameters:
    vehicles: ["m4", "g1", "g1m4"]   # must match the vehicle keys planner_node derives from nominal_path_csv_files

    vector_time_scale: 0.5         # scales velocity into the arrow's tip offset
    shaft_diameter: 0.08           # arrow shaft diameter
    head_diameter: 0.18            # arrow head diameter
    head_length: 0.0               # arrow head length (0 = auto)
    position_marker_scale: 0.25    # sphere marker diameter at the current position

    viz_rate_hz: 30.0            # marker/plot publish rate
    segment_pause_sec: 2.0       # pause length at each per-segment boundary and at the end of the loop
    frame_id_override: ""        # overrides each trajectory message's own frame_id if non-empty
